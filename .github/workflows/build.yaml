name: Build, Test and Upload artifacts

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-build:
    name: API Build, Test and Publish
    runs-on: ubuntu-latest

    outputs:
      artifact-name: api-build

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: backend/global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish src/Api/Api.csproj -c Release --no-build -o publish/api

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: api-build
          path: backend/publish/api/

  web-build:
    name: Web Lint and Build
    runs-on: ubuntu-latest

    outputs:
      artifact-name: web-build

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Type check
        run: npx vue-tsc --build

      - name: Build
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: |
            frontend/dist/
            frontend/nginx.conf
