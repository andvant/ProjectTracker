name: Deploy Docker Images

on:
  workflow_dispatch:

jobs:
  build:
    name: Run build workflow
    uses: ./.github/workflows/build.yaml

  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download API artifacts
        uses: actions/download-artifact@v8
        with:
          name: api-build
          path: publish/api

      - name: Download frontend artifacts
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/dist

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: vars
        run: echo "SHA_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build API image
        run: |
          docker build \
            -f deploy-images/api/Dockerfile \
            -t docker.io/andvant/projecttracker-api:latest \
            -t docker.io/andvant/projecttracker-api:${{ steps.vars.outputs.SHA_TAG }} \
            .

      - name: Build frontend image
        run: |
          docker build \
            -f deploy-images/frontend/Dockerfile \
            -t docker.io/andvant/projecttracker-frontend:latest \
            -t docker.io/andvant/projecttracker-frontend:${{ steps.vars.outputs.SHA_TAG }} \
            .

      - name: Push API image
        run: |
          docker push docker.io/andvant/projecttracker-api:latest
          docker push docker.io/andvant/projecttracker-api:${{ steps.vars.outputs.SHA_TAG }}

      - name: Push frontend image
        run: |
          docker push docker.io/andvant/projecttracker-frontend:latest
          docker push docker.io/andvant/projecttracker-frontend:${{ steps.vars.outputs.SHA_TAG }}
