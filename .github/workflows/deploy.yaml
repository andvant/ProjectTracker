name: Deploy Docker Images to Docker Hub

on:
  workflow_dispatch:

jobs:
  build:
    name: Run build workflow
    uses: ./.github/workflows/build.yaml

  deploy:
    name: Deploy Docker images
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download API artifacts
        uses: actions/download-artifact@v8
        with:
          name: api-build
          path: api-artifacts

      - name: Download Web artifacts
        uses: actions/download-artifact@v8
        with:
          name: web-build
          path: web-artifacts

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: vars
        run: echo "SHA_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build API image
        run: |
          docker build \
            -f deploy-images/api/Dockerfile \
            -t docker.io/andvant/projecttracker-api:latest \
            -t docker.io/andvant/projecttracker-api:${{ steps.vars.outputs.SHA_TAG }} \
            api-artifacts

      - name: Build Web image
        run: |
          docker build \
            -f deploy-images/web/Dockerfile \
            -t docker.io/andvant/projecttracker-web:latest \
            -t docker.io/andvant/projecttracker-web:${{ steps.vars.outputs.SHA_TAG }} \
            web-artifacts

      - name: Push API image
        run: |
          docker push docker.io/andvant/projecttracker-api:latest
          docker push docker.io/andvant/projecttracker-api:${{ steps.vars.outputs.SHA_TAG }}

      - name: Push Web image
        run: |
          docker push docker.io/andvant/projecttracker-web:latest
          docker push docker.io/andvant/projecttracker-web:${{ steps.vars.outputs.SHA_TAG }}
